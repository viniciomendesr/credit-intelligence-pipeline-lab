name: Credit Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: credit-api
  REPO: credit-api

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    # PRs rodam só os testes — deploy só acontece em push para main
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories create $REPO \
            --repository-format=docker \
            --location=$REGION \
            --quiet 2>/dev/null || echo "repo already exists"

      - name: Build image
        run: |
          IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/$SERVICE:$GITHUB_SHA
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet
          docker build --platform linux/amd64 -t $IMAGE .

      - name: Push image
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --service-account credit-pipeline-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars MART_BUCKET=credit-pipeline-demo-marts,MART_OBJECT=mart_credit_features.parquet \
            --update-secrets ANTHROPIC_API_KEY=anthropic-api-key:latest \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe $SERVICE \
            --region $REGION \
            --format "value(status.url)"
